<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebuild — App Icon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0A0A0C;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  font-family: system-ui, sans-serif;
}
.label { color: #444; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 10px; }
.icon-wrap { display: flex; flex-direction: column; align-items: center; }
.row { display: flex; align-items: flex-end; gap: 52px; }
.title { color: #555; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>

<div class="row">

  <!-- 1024×1024 master — shown at 280×280 -->
  <div class="icon-wrap">
  <svg width="280" height="280" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="900" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#111318"/>
        <stop offset="100%" stop-color="#1C1F2A"/>
      </linearGradient>
      <!-- Glow for floating brick -->
      <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
        <feGaussianBlur stdDeviation="14" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <!-- Subtle drop shadow under floating brick -->
      <filter id="dropShadow" x="-15%" y="-15%" width="130%" height="160%">
        <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#C91A09" flood-opacity="0.35"/>
      </filter>
      <!-- iOS squircle clip -->
      <clipPath id="clip">
        <rect width="1024" height="1024" rx="224" ry="224"/>
      </clipPath>
    </defs>

    <g clip-path="url(#clip)">
      <!-- ── Background ── -->
      <rect width="1024" height="1024" fill="url(#bg)"/>
      <!-- Ambient red glow pool behind the stack -->
      <ellipse cx="496" cy="620" rx="400" ry="180" fill="#C91A09" opacity="0.07"/>

      <!--
        Brick geometry:
          fx=182  fw=560  fh=90  dx=56  dy=22
          Each face:
            Front  : rect(fx, fy, fw, fh)
            Top    : poly fx,fy  fx+fw,fy  fx+fw+dx,fy-dy  fx+dx,fy-dy
            Right  : poly fx+fw,fy  fx+fw+dx,fy-dy  fx+fw+dx,fy-dy+fh  fx+fw,fy+fh
          Studs at cx = [280,420,560,700], cy = fy-11
          Stacking: fy_next = fy_prev - fh  (bricks share front-top/front-bottom edge)

        Layers:
          A  fy=718 (bottom)
          B  fy=628
          C  fy=538  ← top of stack, studs exposed
          Ghost fy=448  ← dashed placeholder
          D  fy=268  ← floating, descending
      -->

      <!-- ──────────── BRICK A (fy=718) ──────────── -->
      <polygon points="742,718 798,696 798,786 742,808" fill="#780C03"/>
      <polygon points="182,718 742,718 798,696 238,696" fill="#D42010"/>
      <rect x="182" y="718" width="560" height="90" fill="#C91A09"/>
      <!-- Bright highlight top edge -->
      <rect x="182" y="718" width="560" height="2" rx="1" fill="#FF5030" opacity="0.4"/>
      <!-- Studs A (covered by B's front face — drawn now, overwritten later) -->
      <ellipse cx="280" cy="707" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="280" cy="705" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="420" cy="707" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="420" cy="705" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="560" cy="707" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="560" cy="705" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="700" cy="707" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="700" cy="705" rx="21" ry="7"  fill="#E82312"/>

      <!-- ──────────── BRICK B (fy=628) ──────────── -->
      <polygon points="742,628 798,606 798,696 742,718" fill="#780C03"/>
      <polygon points="182,628 742,628 798,606 238,606" fill="#D42010"/>
      <rect x="182" y="628" width="560" height="90" fill="#C91A09"/>
      <rect x="182" y="628" width="560" height="2" rx="1" fill="#FF5030" opacity="0.4"/>
      <!-- Studs B (covered by C's front face) -->
      <ellipse cx="280" cy="617" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="280" cy="615" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="420" cy="617" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="420" cy="615" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="560" cy="617" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="560" cy="615" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="700" cy="617" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="700" cy="615" rx="21" ry="7"  fill="#E82312"/>

      <!-- ──────────── BRICK C (fy=538) — top of stack ──────────── -->
      <polygon points="742,538 798,516 798,606 742,628" fill="#780C03"/>
      <polygon points="182,538 742,538 798,516 238,516" fill="#D42010"/>
      <rect x="182" y="538" width="560" height="90" fill="#C91A09"/>
      <rect x="182" y="538" width="560" height="2" rx="1" fill="#FF5030" opacity="0.4"/>
      <!-- Studs C — VISIBLE (D is floating above) -->
      <ellipse cx="280" cy="527" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="280" cy="525" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="420" cy="527" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="420" cy="525" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="560" cy="527" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="560" cy="525" rx="21" ry="7"  fill="#E82312"/>
      <ellipse cx="700" cy="527" rx="28" ry="10" fill="#A01007"/>
      <ellipse cx="700" cy="525" rx="21" ry="7"  fill="#E82312"/>

      <!-- ──────────── GHOST / LANDING ZONE (fy=448) ──────────── -->
      <!-- Where brick D will click into place -->
      <polygon points="742,448 798,426 798,516 742,538"
               fill="none" stroke="#C91A09" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="10 8"/>
      <polygon points="182,448 742,448 798,426 238,426"
               fill="#C91A09" fill-opacity="0.04"
               stroke="#C91A09" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="10 8"/>
      <rect x="182" y="448" width="560" height="90" rx="2"
            fill="#C91A09" fill-opacity="0.04"
            stroke="#C91A09" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="10 8"/>
      <!-- Ghost stud outlines -->
      <ellipse cx="280" cy="437" rx="26" ry="9" fill="none" stroke="#C91A09" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6 5"/>
      <ellipse cx="420" cy="437" rx="26" ry="9" fill="none" stroke="#C91A09" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6 5"/>
      <ellipse cx="560" cy="437" rx="26" ry="9" fill="none" stroke="#C91A09" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6 5"/>
      <ellipse cx="700" cy="437" rx="26" ry="9" fill="none" stroke="#C91A09" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6 5"/>

      <!-- Descent indicator: small dashed line + arrowhead -->
      <line x1="512" y1="360" x2="512" y2="445"
            stroke="#C91A09" stroke-width="2.5" stroke-opacity="0.3" stroke-dasharray="7 6"/>
      <polygon points="503,440 512,458 521,440" fill="#C91A09" opacity="0.25"/>

      <!-- Soft glow halo just below floating brick -->
      <ellipse cx="490" cy="368" rx="270" ry="12" fill="#C91A09" opacity="0.12"/>

      <!-- ──────────── FLOATING BRICK D (fy=268) ──────────── -->
      <polygon points="742,268 798,246 798,336 742,358" fill="#900F05" filter="url(#dropShadow)"/>
      <polygon points="182,268 742,268 798,246 238,246" fill="#EA2A18"/>
      <rect x="182" y="268" width="560" height="90" fill="#D41C0A" filter="url(#glow)"/>
      <!-- Sharper highlight edge on D — it's the "active" piece -->
      <rect x="182" y="268" width="560" height="3" rx="1" fill="#FF6848" opacity="0.75"/>
      <!-- Right-face edge highlight -->
      <line x1="742" y1="268" x2="798" y2="246" stroke="#FF5030" stroke-width="1.5" opacity="0.35"/>
      <!-- Studs D — VISIBLE -->
      <ellipse cx="280" cy="257" rx="28" ry="10" fill="#B01208"/>
      <ellipse cx="280" cy="255" rx="21" ry="7"  fill="#F03C28"/>
      <ellipse cx="420" cy="257" rx="28" ry="10" fill="#B01208"/>
      <ellipse cx="420" cy="255" rx="21" ry="7"  fill="#F03C28"/>
      <ellipse cx="560" cy="257" rx="28" ry="10" fill="#B01208"/>
      <ellipse cx="560" cy="255" rx="21" ry="7"  fill="#F03C28"/>
      <ellipse cx="700" cy="257" rx="28" ry="10" fill="#B01208"/>
      <ellipse cx="700" cy="255" rx="21" ry="7"  fill="#F03C28"/>

      <!-- ── Ground line ── -->
      <rect x="140" y="812" width="744" height="2" rx="1" fill="#C91A09" opacity="0.12"/>
    </g>
  </svg>
  <div class="label">1024 × 1024</div>
  </div>

  <!-- 120×120 — iOS Home Screen -->
  <div class="icon-wrap">
  <svg width="120" height="120" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg2" x1="0" y1="0" x2="900" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#111318"/><stop offset="100%" stop-color="#1C1F2A"/>
      </linearGradient>
      <clipPath id="clip2"><rect width="1024" height="1024" rx="224" ry="224"/></clipPath>
    </defs>
    <g clip-path="url(#clip2)">
      <rect width="1024" height="1024" fill="url(#bg2)"/>
      <ellipse cx="496" cy="620" rx="400" ry="180" fill="#C91A09" opacity="0.07"/>
      <!-- A -->
      <polygon points="742,718 798,696 798,786 742,808" fill="#780C03"/>
      <polygon points="182,718 742,718 798,696 238,696" fill="#D42010"/>
      <rect x="182" y="718" width="560" height="90" fill="#C91A09"/>
      <!-- B -->
      <polygon points="742,628 798,606 798,696 742,718" fill="#780C03"/>
      <polygon points="182,628 742,628 798,606 238,606" fill="#D42010"/>
      <rect x="182" y="628" width="560" height="90" fill="#C91A09"/>
      <!-- C + visible studs -->
      <polygon points="742,538 798,516 798,606 742,628" fill="#780C03"/>
      <polygon points="182,538 742,538 798,516 238,516" fill="#D42010"/>
      <rect x="182" y="538" width="560" height="90" fill="#C91A09"/>
      <ellipse cx="280" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="280" cy="525" rx="21" ry="7" fill="#E82312"/>
      <ellipse cx="420" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="420" cy="525" rx="21" ry="7" fill="#E82312"/>
      <ellipse cx="560" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="560" cy="525" rx="21" ry="7" fill="#E82312"/>
      <ellipse cx="700" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="700" cy="525" rx="21" ry="7" fill="#E82312"/>
      <!-- Ghost -->
      <rect x="182" y="448" width="560" height="90" fill="#C91A09" fill-opacity="0.05" stroke="#C91A09" stroke-opacity="0.2" stroke-width="2.5" stroke-dasharray="10 8" rx="2"/>
      <!-- Drop line -->
      <line x1="512" y1="360" x2="512" y2="445" stroke="#C91A09" stroke-width="2.5" stroke-opacity="0.3" stroke-dasharray="7 6"/>
      <polygon points="504,440 512,458 520,440" fill="#C91A09" opacity="0.25"/>
      <!-- Floating D + studs -->
      <polygon points="742,268 798,246 798,336 742,358" fill="#900F05"/>
      <polygon points="182,268 742,268 798,246 238,246" fill="#EA2A18"/>
      <rect x="182" y="268" width="560" height="90" fill="#D41C0A"/>
      <rect x="182" y="268" width="560" height="3" rx="1" fill="#FF6848" opacity="0.7"/>
      <ellipse cx="280" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="280" cy="255" rx="21" ry="7" fill="#F03C28"/>
      <ellipse cx="420" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="420" cy="255" rx="21" ry="7" fill="#F03C28"/>
      <ellipse cx="560" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="560" cy="255" rx="21" ry="7" fill="#F03C28"/>
      <ellipse cx="700" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="700" cy="255" rx="21" ry="7" fill="#F03C28"/>
    </g>
  </svg>
  <div class="label">120 × 120</div>
  </div>

  <!-- 60×60 — Small -->
  <div class="icon-wrap">
  <svg width="60" height="60" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg3" x1="0" y1="0" x2="900" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#111318"/><stop offset="100%" stop-color="#1C1F2A"/>
      </linearGradient>
      <clipPath id="clip3"><rect width="1024" height="1024" rx="224" ry="224"/></clipPath>
    </defs>
    <g clip-path="url(#clip3)">
      <rect width="1024" height="1024" fill="url(#bg3)"/>
      <polygon points="742,718 798,696 798,786 742,808" fill="#780C03"/>
      <polygon points="182,718 742,718 798,696 238,696" fill="#D42010"/>
      <rect x="182" y="718" width="560" height="90" fill="#C91A09"/>
      <polygon points="742,628 798,606 798,696 742,718" fill="#780C03"/>
      <polygon points="182,628 742,628 798,606 238,606" fill="#D42010"/>
      <rect x="182" y="628" width="560" height="90" fill="#C91A09"/>
      <polygon points="742,538 798,516 798,606 742,628" fill="#780C03"/>
      <polygon points="182,538 742,538 798,516 238,516" fill="#D42010"/>
      <rect x="182" y="538" width="560" height="90" fill="#C91A09"/>
      <ellipse cx="280" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="280" cy="525" rx="21" ry="7" fill="#E82312"/>
      <ellipse cx="420" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="420" cy="525" rx="21" ry="7" fill="#E82312"/>
      <ellipse cx="560" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="560" cy="525" rx="21" ry="7" fill="#E82312"/>
      <ellipse cx="700" cy="527" rx="28" ry="10" fill="#A01007"/><ellipse cx="700" cy="525" rx="21" ry="7" fill="#E82312"/>
      <rect x="182" y="448" width="560" height="90" fill="#C91A09" fill-opacity="0.07" stroke="#C91A09" stroke-opacity="0.25" stroke-width="2.5" stroke-dasharray="10 8" rx="2"/>
      <line x1="512" y1="360" x2="512" y2="445" stroke="#C91A09" stroke-width="3" stroke-opacity="0.28" stroke-dasharray="7 6"/>
      <polygon points="742,268 798,246 798,336 742,358" fill="#900F05"/>
      <polygon points="182,268 742,268 798,246 238,246" fill="#EA2A18"/>
      <rect x="182" y="268" width="560" height="90" fill="#D41C0A"/>
      <ellipse cx="280" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="280" cy="255" rx="21" ry="7" fill="#F03C28"/>
      <ellipse cx="420" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="420" cy="255" rx="21" ry="7" fill="#F03C28"/>
      <ellipse cx="560" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="560" cy="255" rx="21" ry="7" fill="#F03C28"/>
      <ellipse cx="700" cy="257" rx="28" ry="10" fill="#B01208"/><ellipse cx="700" cy="255" rx="21" ry="7" fill="#F03C28"/>
    </g>
  </svg>
  <div class="label">60 × 60</div>
  </div>

</div>

<div class="title">Rebuild — Training Intelligence</div>

</body>
</html>
